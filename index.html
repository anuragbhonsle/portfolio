<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Anurag Bhonsle | Full Stack Developer</title>
    <meta
      name="description"
      content="Anurag Bhonsle is a Full Stack Developer skilled in React, Node.js, and modern web technologies. Explore projects, portfolio, and resume."
    />
    <meta name="author" content="Anurag Bhonsle" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://anuragbhonsle.vercel.app/" />

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Anurag Bhonsle | Full Stack Developer" />
    <meta
      property="og:description"
      content="Full Stack Developer building modern, scalable web apps using React and Node.js."
    />
    <meta property="og:url" content="https://anuragbhonsle.vercel.app/" />
    <meta
      property="og:image"
      content="https://anuragbhonsle.vercel.app/og-image.png"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Anurag Bhonsle | Full Stack Developer"
    />
    <meta
      name="twitter:description"
      content="Explore my projects, skills, and resume. Let's build something amazing."
    />
    <meta
      name="twitter:image"
      content="https://anuragbhonsle.vercel.app/og-image.png"
    />

    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Theme Script -->
    <script>
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved === "dark") {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.add("light");
        }
      })();
    </script>

    <!-- Structured Data (SEO Boost) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Anurag Bhonsle",
        "url": "https://anuragbhonsle.vercel.app/",
        "jobTitle": "Full Stack Developer",
        "sameAs": [
          "https://github.com/yourusername",
          "https://linkedin.com/in/yourprofile"
        ]
      }
    </script>
  </head>

  <body class="bg-background text-foreground font-space">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
